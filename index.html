<title>OneList</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/firebase@8.10.1/firebase-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@8.10.1/firebase-database.js"></script>
<style>
  :root {
    --bg: #FFF8F0;
    --card: #FFFFFF;
    --primary: #2D5A3D;
    --primary-light: #E8F5E9;
    --primary-dark: #1B3D28;
    --accent: #E8735A;
    --accent-light: #FFF0EC;
    --text: #1A2E23;
    --text-mid: #5A7A66;
    --text-light: #8FA89A;
    --border: rgba(45,90,61,0.1);
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
    --mattc:  #4A90D9;
    --matth:  #27AE60;
    --becky:  #D94A8A;
    --bailey: #E8A020;
    --syd:    #9B59B6;
    --emma:   #1ABC9C;
    --abby:   #E74C3C;
    --header-h: 168px;
    --tabs-h:   41px;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    font-family:'DM Sans',sans-serif;
    background:var(--bg); color:var(--text);
    min-height:100vh; min-height:100dvh;
    padding-bottom:70px; overflow-x:hidden;
  }

  /* HEADER */
  .app-header {
    background:linear-gradient(135deg,var(--primary) 0%,var(--primary-dark) 100%);
    padding:0.5rem 1rem;
    position:sticky; top:0; z-index:100;
    box-shadow:0 4px 20px rgba(0,0,0,0.12);
  }
  .header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:0.35rem; }
  .app-title { font-family:'Fraunces',serif; font-size:1.4rem; font-weight:800; color:white; letter-spacing:-0.5px; }
  .app-title span { color:var(--accent); }
  .header-btn {
    background:rgba(255,255,255,0.12); border:none; border-radius:10px;
    color:white; font-size:1.1rem; width:38px; height:38px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:background 0.2s;
  }
  .header-btn:hover { background:rgba(255,255,255,0.2); }

  /* USER PICKER */
  .user-picker { display:flex; gap:0.3rem; margin-bottom:0.4rem; }
  .user-chip {
    flex:1; padding:0.3rem 0.2rem;
    border:2px solid rgba(255,255,255,0.15); border-radius:10px;
    background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.6);
    font-family:'DM Sans',sans-serif; font-size:0.72rem; font-weight:600;
    cursor:pointer; transition:all 0.2s; text-align:center; white-space:nowrap;
  }
  .user-chip.active-mattc  { border-color:var(--mattc);  background:rgba(74,144,217,0.25);  color:white; }
  .user-chip.active-matth  { border-color:var(--matth);  background:rgba(39,174,96,0.25);   color:white; }
  .user-chip.active-becky  { border-color:var(--becky);  background:rgba(217,74,138,0.25);  color:white; }
  .user-chip.active-bailey { border-color:var(--bailey); background:rgba(232,160,32,0.25);  color:white; }
  .user-chip.active-syd    { border-color:var(--syd);    background:rgba(155,89,182,0.25);  color:white; }
  .user-chip.active-emma   { border-color:var(--emma);   background:rgba(26,188,156,0.25);  color:white; }
  .user-chip.active-abby   { border-color:var(--abby);   background:rgba(231,76,60,0.25);   color:white; }

  /* ADD BAR */
  .add-bar { display:flex; gap:0.4rem; align-items:center; }
  .add-input {
    flex:1; padding:0.7rem 1rem;
    border:2px solid rgba(255,255,255,0.15); border-radius:12px;
    background:rgba(255,255,255,0.1); color:white;
    font-family:'DM Sans',sans-serif; font-size:0.95rem; font-weight:500;
    outline:none; transition:border-color 0.2s;
  }
  .add-input::placeholder { color:rgba(255,255,255,0.35); }
  .add-input:focus { border-color:rgba(255,255,255,0.4); }
  .add-btn {
    width:44px; height:44px; border:none; border-radius:12px;
    background:var(--accent); color:white; font-size:1.3rem;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:transform 0.15s; flex-shrink:0;
  }
  .add-btn:active { transform:scale(0.92); }
  .mic-btn {
    width:44px; height:44px; border:none; border-radius:12px;
    background:rgba(255,255,255,0.12); color:white; font-size:1.1rem;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:background 0.2s; flex-shrink:0;
  }
  .mic-btn.recording { background:#E74C3C; animation:micPulse 1s ease infinite; }
  @keyframes micPulse { 0%,100%{opacity:1;} 50%{opacity:0.6;} }
  .category-hint {
    font-size:0.72rem; color:rgba(255,255,255,0.4);
    margin-top:0.4rem; min-height:1rem; padding-left:0.2rem;
  }
  .category-hint em { color:var(--accent); font-style:normal; font-weight:600; }

  /* STORE FILTER TABS */
  .store-tabs-wrap {
    position:sticky; top:var(--header-h);
    z-index:90; background:var(--bg);
    border-bottom:1px solid var(--border);
    box-shadow:0 2px 6px rgba(0,0,0,0.04);
  }
  .store-tabs {
    display:flex; overflow-x:scroll;
    -webkit-overflow-scrolling:touch; scrollbar-width:none;
    padding:0 0.75rem;
    touch-action:pan-x;
    overscroll-behavior-x:contain;
  }
  .store-tabs::-webkit-scrollbar { display:none; }
  .store-tab {
    flex-shrink:0; padding:0.55rem 0.9rem;
    border:none; background:none;
    font-family:'DM Sans',sans-serif; font-size:0.78rem; font-weight:600;
    color:var(--text-light); cursor:pointer;
    border-bottom:2.5px solid transparent;
    transition:all 0.18s; white-space:nowrap;
    margin-bottom:-1px;
  }
  .store-tab:hover { color:var(--primary); }
  .store-tab.active { color:var(--primary); border-bottom-color:var(--primary); }

  /* STATS */
  .stats-bar { display:flex; justify-content:space-between; align-items:center; padding:0.7rem 1.2rem; }
  .stats-text { font-size:0.78rem; font-weight:600; color:var(--text-light); }
  .stats-text strong { color:var(--primary); }
  .clear-done-btn {
    font-family:'DM Sans',sans-serif; font-size:0.75rem; font-weight:600;
    color:var(--accent); background:none; border:none; cursor:pointer;
    padding:0.3rem 0.6rem; border-radius:6px; transition:background 0.2s;
  }
  .clear-done-btn:hover { background:var(--accent-light); }

  /* AISLE GROUPS */
  .aisle-group { margin:0 1rem 0.8rem; }
  .aisle-header {
    display:flex; align-items:center; gap:0.5rem;
    padding:0.5rem 0.3rem;
    position:sticky; top:calc(var(--header-h) + var(--tabs-h));
    z-index:10; background:var(--bg);
  }
  .aisle-icon { font-size:1.1rem; }
  .aisle-name { font-family:'Fraunces',serif; font-size:0.88rem; font-weight:700; color:var(--primary); letter-spacing:-0.3px; }
  .aisle-count { font-size:0.65rem; font-weight:700; color:var(--text-light); background:var(--primary-light); padding:0.1rem 0.45rem; border-radius:8px; }

  /* ITEM CARD */
  .item-card {
    background:var(--card); border-radius:12px;
    padding:0.7rem 0.8rem; margin-bottom:0.4rem;
    display:flex; align-items:center; gap:0.7rem;
    box-shadow:var(--shadow); transition:transform 0.2s, opacity 0.3s;
    position:relative; overflow:hidden;
  }
  .item-card.checked { opacity:0.5; background:#F5F5F0; box-shadow:none; }
  .item-card.checked .item-name { text-decoration:line-through; color:var(--text-light); }
  .item-card.just-checked { animation:checkSlide 0.4s ease; }
  @keyframes checkSlide { 0%{transform:scale(1);} 30%{transform:scale(0.97);} 100%{transform:scale(1);} }

  .item-check {
    width:26px; height:26px; border-radius:8px;
    border:2.5px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0; font-size:0.75rem; color:transparent;
    background:white; transition:all 0.2s; cursor:pointer; z-index:2;
  }
  .item-card.checked .item-check { background:var(--primary); border-color:var(--primary); color:white; }

  .item-body {
    flex:1; min-width:0; display:flex; align-items:center; gap:0.5rem; cursor:pointer;
  }
  .item-info { flex:1; min-width:0; }
  .item-name { font-size:0.9rem; font-weight:600; color:var(--text); line-height:1.3; }
  .item-qty  { font-size:0.72rem; color:var(--text-mid); margin-top:0.1rem; }

  /* Store badge */
  .store-badge {
    flex-shrink:0; font-size:0.58rem; font-weight:800;
    padding:0.18rem 0.4rem; border-radius:5px; color:white; letter-spacing:0.4px;
  }
  .store-badge.schnucks   { background:#C0392B; }
  .store-badge.costco     { background:#0047AB; }
  .store-badge.traderjoes { background:#D35400; }
  .store-badge.dierbergs  { background:#27AE60; }
  .store-badge.wholefoods { background:#00674B; }
  .store-badge.target     { background:#CC0000; }
  .store-badge.totalwine  { background:#7B1F2E; }
  .store-badge.sams       { background:#0071CE; }
  .store-badge.smokehouse { background:#6B3A2A; }
  .store-badge.homedepot  { background:#F96302; }
  .store-badge.michaels   { background:#2D6E3E; }

  .item-user {
    width:22px; height:22px; border-radius:50%;
    font-size:0.55rem; font-weight:800; color:white;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .item-user.mattc  { background:var(--mattc); }
  .item-user.matth  { background:var(--matth); }
  .item-user.becky  { background:var(--becky); }
  .item-user.bailey { background:var(--bailey); }
  .item-user.syd    { background:var(--syd); }
  .item-user.emma   { background:var(--emma); }
  .item-user.abby   { background:var(--abby); }

  .item-delete {
    background:none; border:none; color:var(--text-light); font-size:1rem;
    cursor:pointer; padding:0.3rem; opacity:0; transition:opacity 0.2s; flex-shrink:0;
  }
  .item-card:hover .item-delete, .item-card:active .item-delete { opacity:1; }
  @media (hover:none) { .item-delete { opacity:0.4; } }

  /* EMPTY STATE */
  .empty-state { text-align:center; padding:3rem 2rem; }
  .empty-icon  { font-size:3rem; margin-bottom:0.5rem; }
  .empty-title { font-family:'Fraunces',serif; font-size:1.2rem; font-weight:700; color:var(--text); margin-bottom:0.3rem; }
  .empty-sub   { font-size:0.85rem; color:var(--text-light); }

  /* BOTTOM NAV */
  .bottom-nav {
    position:fixed; bottom:0; left:0; right:0;
    background:white; border-top:1px solid var(--border);
    display:flex; padding:0.3rem 0.5rem;
    padding-bottom:calc(env(safe-area-inset-bottom,0px) + 0.2rem);
    z-index:100; box-shadow:0 -2px 12px rgba(0,0,0,0.05);
  }
  .nav-btn {
    flex:1; display:flex; flex-direction:column; align-items:center; gap:0.2rem;
    padding:0.25rem 0; border:none; background:none; cursor:pointer;
    color:var(--text-light); transition:color 0.2s; font-family:'DM Sans',sans-serif;
  }
  .nav-btn.active { color:var(--primary); }
  .nav-icon  { font-size:1.3rem; }
  .nav-label { font-size:0.65rem; font-weight:600; letter-spacing:0.3px; }

  /* PANELS */
  .panel { display:none; }
  .panel.active { display:block; }

  /* SAVED LISTS */
  .saved-card {
    background:var(--card); border-radius:14px; padding:1rem;
    margin:0 1rem 0.6rem; box-shadow:var(--shadow);
    display:flex; align-items:center; gap:0.8rem;
    cursor:pointer; transition:transform 0.15s;
  }
  .saved-card:active { transform:scale(0.98); }
  .saved-icon { width:44px; height:44px; border-radius:12px; background:var(--primary-light); display:flex; align-items:center; justify-content:center; font-size:1.3rem; flex-shrink:0; }
  .saved-info { flex:1; min-width:0; }
  .saved-name { font-family:'Fraunces',serif; font-size:0.95rem; font-weight:700; color:var(--text); }
  .saved-meta { font-size:0.72rem; color:var(--text-light); margin-top:0.1rem; }
  .saved-del  { width:34px; height:34px; border:none; border-radius:8px; background:var(--accent-light); color:var(--accent); font-size:0.9rem; display:flex; align-items:center; justify-content:center; cursor:pointer; }

  /* FREQUENT */
  .freq-grid { display:flex; flex-wrap:wrap; gap:0.4rem; padding:0 1rem; }
  .freq-group { margin-bottom:1rem; }
  .freq-cat-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:0.5rem 1rem 0.4rem;
    cursor:pointer; user-select:none;
  }
  .freq-cat-left { display:flex; align-items:center; gap:0.4rem; }
  .freq-cat-icon { font-size:1rem; }
  .freq-cat-name {
    font-family:'Fraunces',serif; font-size:0.85rem; font-weight:700;
    color:var(--primary); letter-spacing:-0.2px;
  }
  .freq-cat-count {
    font-size:0.62rem; font-weight:700; color:var(--text-light);
    background:var(--primary-light); padding:0.1rem 0.4rem; border-radius:8px;
  }
  .freq-cat-chevron {
    font-size:0.7rem; color:var(--text-light);
    transition:transform 0.2s;
  }
  .freq-cat-chevron.collapsed { transform:rotate(-90deg); }
  .freq-cat-pills {
    display:flex; flex-wrap:wrap; gap:0.4rem;
    padding:0 1rem 0.2rem;
  }
  .freq-cat-pills.hidden { display:none; }
  .freq-chip {
    padding:0.5rem 0.9rem; border-radius:20px;
    background:var(--card); border:1.5px solid var(--border);
    font-family:'DM Sans',sans-serif; font-size:0.82rem; font-weight:600;
    color:var(--text); cursor:pointer; transition:all 0.2s;
    box-shadow:0 1px 4px rgba(0,0,0,0.04);
  }
  .freq-chip:active { transform:scale(0.95); background:var(--primary-light); border-color:var(--primary); }
  .freq-chip.edit-mode { padding-right:0.5rem; cursor:default; }
  .freq-chip.edit-mode:active { transform:none; background:var(--card); border-color:var(--border); }
  .freq-remove {
    display:inline-flex; align-items:center; justify-content:center;
    width:16px; height:16px; border-radius:50%;
    background:var(--accent); color:white;
    font-size:0.6rem; font-weight:900;
    margin-left:0.4rem; cursor:pointer;
    vertical-align:middle; border:none; line-height:1;
    flex-shrink:0;
  }
  .section-title { font-family:'Fraunces',serif; font-size:1rem; font-weight:700; color:var(--text); padding:1rem 1.2rem 0.6rem; }

  /* MODALS */
  .modal-overlay {
    display:none; position:fixed; top:0; left:0; right:0; bottom:0;
    background:rgba(0,0,0,0.45); z-index:200;
    align-items:flex-end; justify-content:center;
    touch-action:none;
  }
  .modal-overlay.open { display:flex; }
  .modal-panel {
    background:white; border-radius:20px 20px 0 0;
    width:100%; max-width:500px;
    padding:1.5rem; padding-bottom:calc(env(safe-area-inset-bottom,0px) + 1rem);
    animation:modalUp 0.3s ease;
    max-height:88vh;
    display:flex; flex-direction:column;
    -webkit-overflow-scrolling:touch;
  }
  .modal-scroll-body {
    overflow-y:auto;
    flex:1;
    min-height:0;
    -webkit-overflow-scrolling:touch;
    touch-action:pan-y;
    overscroll-behavior:contain;
    padding-bottom:0.5rem;
  }
  @keyframes modalUp { from{transform:translateY(100%);} to{transform:translateY(0);} }
  .modal-title { font-family:'Fraunces',serif; font-size:1.2rem; font-weight:700; margin-bottom:1rem; }
  .modal-input {
    width:100%; padding:0.8rem 1rem;
    border:2px solid var(--border); border-radius:12px;
    font-family:'DM Sans',sans-serif; font-size:0.95rem; font-weight:500;
    color:var(--text); outline:none; margin-bottom:1rem; transition:border-color 0.2s;
  }
  .modal-input:focus { border-color:var(--primary); }
  .modal-actions { display:flex; gap:0.6rem; }
  .modal-btn { flex:1; padding:0.8rem; border:none; border-radius:12px; font-family:'DM Sans',sans-serif; font-size:0.9rem; font-weight:700; cursor:pointer; transition:transform 0.15s; }
  .modal-btn:active { transform:scale(0.97); }
  .modal-btn-cancel { background:#F0F0F0; color:var(--text-mid); }
  .modal-btn-save   { background:var(--primary); color:white; }

  /* STORE PICKER */
  .store-item-name { font-size:0.82rem; color:var(--text-mid); font-weight:500; margin-bottom:1rem; margin-top:-0.4rem; }
  .store-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:0.4rem; margin-bottom:0.5rem; }
  .store-option {
    padding:0.6rem 0.3rem; border:2px solid var(--border); border-radius:12px;
    background:white; font-family:'DM Sans',sans-serif; font-size:0.75rem; font-weight:700;
    color:var(--text); cursor:pointer; text-align:center;
    transition:all 0.15s; display:flex; flex-direction:column; align-items:center; gap:0.15rem;
  }
  .store-option:active { transform:scale(0.97); }
  .store-option.sel-schnucks   { background:#C0392B; border-color:#C0392B; color:white; }
  .store-option.sel-costco     { background:#0047AB; border-color:#0047AB; color:white; }
  .store-option.sel-traderjoes { background:#D35400; border-color:#D35400; color:white; }
  .store-option.sel-dierbergs  { background:#27AE60; border-color:#27AE60; color:white; }
  .store-option.sel-wholefoods { background:#00674B; border-color:#00674B; color:white; }
  .store-option.sel-target     { background:#CC0000; border-color:#CC0000; color:white; }
  .store-option.sel-totalwine  { background:#7B1F2E; border-color:#7B1F2E; color:white; }
  .store-option.sel-sams       { background:#0071CE; border-color:#0071CE; color:white; }
  .store-option.sel-smokehouse { background:#6B3A2A; border-color:#6B3A2A; color:white; }
  .store-option.sel-homedepot  { background:#F96302; border-color:#F96302; color:white; }
  .store-option.sel-michaels   { background:#2D6E3E; border-color:#2D6E3E; color:white; }
  .store-abbr { font-size:0.6rem; font-weight:800; letter-spacing:0.5px; opacity:0.65; }
  .store-option[class*="sel-"] .store-abbr { opacity:0.85; }
  .store-clear { width:100%; padding:0.65rem; margin-bottom:0.6rem; border:2px dashed var(--border); border-radius:12px; background:none; font-family:'DM Sans',sans-serif; font-size:0.82rem; font-weight:600; color:var(--text-light); cursor:pointer; transition:all 0.15s; }
  .store-clear:hover { border-color:var(--accent); color:var(--accent); }
  .cat-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.35rem; }
  .cat-option {
    padding:0.45rem 0.5rem; border:1.5px solid var(--border); border-radius:10px;
    background:white; font-family:'DM Sans',sans-serif; font-size:0.75rem; font-weight:600;
    color:var(--text); cursor:pointer; text-align:left;
    transition:all 0.15s; display:flex; align-items:center; gap:0.3rem;
  }
  .cat-option:active { transform:scale(0.97); }
  .cat-option.active { background:var(--primary-light); border-color:var(--primary); color:var(--primary); }

  /* WHO ARE YOU MODAL */
  .who-overlay {
    position:fixed; top:0; left:0; right:0; bottom:0;
    background:rgba(0,0,0,0.6); z-index:9999;
    display:flex; align-items:center; justify-content:center; padding:1.5rem;
    opacity:0; pointer-events:none;
    transition:opacity 0.25s ease;
  }
  .who-overlay.open { opacity:1; pointer-events:all; }
  .who-panel {
    background:white; border-radius:24px;
    width:100%; max-width:380px;
    padding:2rem 1.5rem;
    animation:modalUp 0.3s ease;
  }
  .who-title {
    font-family:'Fraunces',serif; font-size:1.6rem; font-weight:800;
    color:var(--text); text-align:center; margin-bottom:0.3rem;
  }
  .who-sub {
    font-size:0.82rem; color:var(--text-light);
    text-align:center; margin-bottom:1.5rem;
  }
  .who-grid {
    display:grid; grid-template-columns:1fr 1fr;
    gap:0.6rem;
  }
  .who-btn {
    padding:0.85rem 0.5rem;
    border:2.5px solid var(--border); border-radius:14px;
    background:white;
    font-family:'DM Sans',sans-serif; font-size:0.9rem; font-weight:700;
    color:var(--text); cursor:pointer;
    transition:all 0.15s; text-align:center;
  }
  .who-btn:active { transform:scale(0.96); }
  .who-btn.mattc  { border-color:var(--mattc);  color:var(--mattc); }
  .who-btn.matth  { border-color:var(--matth);  color:var(--matth); }
  .who-btn.becky  { border-color:var(--becky);  color:var(--becky); }
  .who-btn.bailey { border-color:var(--bailey); color:var(--bailey); }
  .who-btn.syd    { border-color:var(--syd);    color:var(--syd); }
  .who-btn.emma   { border-color:var(--emma);   color:var(--emma); }
  .who-btn.abby   { border-color:var(--abby);   color:var(--abby); }
  .who-btn:hover  { color:white; }
  .who-btn.mattc:hover  { background:var(--mattc); }
  .who-btn.matth:hover  { background:var(--matth); }
  .who-btn.becky:hover  { background:var(--becky); }
  .who-btn.bailey:hover { background:var(--bailey); }
  .who-btn.syd:hover    { background:var(--syd); }
  .who-btn.emma:hover   { background:var(--emma); }
  .who-btn.abby:hover   { background:var(--abby); }

  /* TOAST */
  .toast {
    position:fixed; bottom:100px; left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--primary-dark); color:white;
    padding:0.7rem 1.2rem; border-radius:12px;
    font-size:0.82rem; font-weight:600;
    box-shadow:0 4px 20px rgba(0,0,0,0.2);
    opacity:0; transition:all 0.3s ease; z-index:300; pointer-events:none;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  @media (max-width:500px) {
    .app-header { padding:0.4rem 0.8rem; }
    .app-title  { font-size:1.2rem; }
    .user-chip  { font-size:0.66rem; padding:0.28rem 0.15rem; }
  }
</style>

<body>

<!-- HEADER -->
<div class="app-header" id="appHeader">
  <div class="header-top">
    <div class="app-title">📋 One<span>List</span></div>
    <div style="display:flex;align-items:center;gap:0.5rem;">
      <span id="connDot" title="Database status" style="width:9px;height:9px;border-radius:50%;background:#888;display:inline-block;flex-shrink:0;"></span>
      <button class="header-btn" onclick="openWhoModal()" title="Switch user">👤</button>
      <button class="header-btn" onclick="openSaveModal()">💾</button>
    </div>
  </div>
  <div class="user-picker">
    <button class="user-chip active-mattc" id="user-mattc"  onclick="setUser('mattc')">Matt C</button>
    <button class="user-chip"              id="user-matth"  onclick="setUser('matth')">Matt H</button>
    <button class="user-chip"              id="user-becky"  onclick="setUser('becky')">Becky</button>
    <button class="user-chip"              id="user-bailey" onclick="setUser('bailey')">Bailey</button>
    <button class="user-chip"              id="user-syd"    onclick="setUser('syd')">Syd</button>
    <button class="user-chip"              id="user-emma"   onclick="setUser('emma')">Emma</button>
    <button class="user-chip"              id="user-abby"   onclick="setUser('abby')">Abby</button>
  </div>
  <div class="add-bar">
    <input class="add-input" id="addInput" type="text" placeholder="Add an item..." autocomplete="off"
      onkeyup="onInputChange(event)" onkeydown="if(event.key==='Enter')addItem()" oninput="titleCaseInput(this)">
    <button class="mic-btn" id="micBtn" onclick="toggleVoice()">🎤</button>
    <button class="add-btn" onclick="addItem()">+</button>
  </div>
  <div class="category-hint" id="categoryHint"></div>
</div>

<!-- LIST PANEL -->
<div class="panel active" id="panelList">
  <div class="store-tabs-wrap" id="storeTabsWrap">
    <div class="store-tabs">
      <button class="store-tab active" data-store="all"        onclick="setStoreFilter('all')">All</button>
      <button class="store-tab"        data-store="costco"     onclick="setStoreFilter('costco')">Costco</button>
      <button class="store-tab"        data-store="dierbergs"  onclick="setStoreFilter('dierbergs')">Dierbergs</button>
      <button class="store-tab"        data-store="homedepot"  onclick="setStoreFilter('homedepot')">Home Depot</button>
      <button class="store-tab"        data-store="michaels"   onclick="setStoreFilter('michaels')">Michaels</button>
      <button class="store-tab"        data-store="sams"       onclick="setStoreFilter('sams')">Sam's Club</button>
      <button class="store-tab"        data-store="schnucks"   onclick="setStoreFilter('schnucks')">Schnucks</button>
      <button class="store-tab"        data-store="smokehouse" onclick="setStoreFilter('smokehouse')">Smoke House</button>
      <button class="store-tab"        data-store="target"     onclick="setStoreFilter('target')">Target</button>
      <button class="store-tab"        data-store="totalwine"  onclick="setStoreFilter('totalwine')">Total Wine</button>
      <button class="store-tab"        data-store="traderjoes" onclick="setStoreFilter('traderjoes')">Trader Joe's</button>
      <button class="store-tab"        data-store="wholefoods" onclick="setStoreFilter('wholefoods')">Whole Foods</button>
    </div>
  </div>
  <div class="stats-bar" id="statsBar"></div>
  <div id="listContent"></div>
</div>

<!-- SAVED PANEL -->
<div class="panel" id="panelSaved">
  <div class="section-title">Saved Lists</div>
  <div id="savedContent"></div>
</div>

<!-- FREQUENT PANEL -->
<div class="panel" id="panelFrequent">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:1rem 1.2rem 0.6rem;">
    <div class="section-title" style="padding:0;">Frequently Bought</div>
    <button id="freqEditBtn" onclick="toggleFreqEdit()" style="font-family:'DM Sans',sans-serif;font-size:0.78rem;font-weight:700;color:var(--primary);background:var(--primary-light);border:none;border-radius:8px;padding:0.35rem 0.75rem;cursor:pointer;">Edit</button>
  </div>
  <div class="freq-grid" id="freqContent"></div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" data-panel="panelList"     onclick="switchPanel('panelList')"><span class="nav-icon">📋</span><span class="nav-label">List</span></button>
  <button class="nav-btn"        data-panel="panelSaved"    onclick="switchPanel('panelSaved')"><span class="nav-icon">📁</span><span class="nav-label">Saved</span></button>
  <button class="nav-btn"        data-panel="panelFrequent" onclick="switchPanel('panelFrequent')"><span class="nav-icon">⭐</span><span class="nav-label">Frequent</span></button>
</div>

<!-- WHO ARE YOU MODAL -->
<div class="who-overlay" id="whoModal">
  <div class="who-panel">
    <div class="who-title">Which Holt are you? 👋</div>
    <div class="who-sub">We'll remember your choice on this device</div>
    <div class="who-grid">
      <button class="who-btn mattc"  onclick="pickUser('mattc')">Matt C</button>
      <button class="who-btn matth"  onclick="pickUser('matth')">Matt H</button>
      <button class="who-btn becky"  onclick="pickUser('becky')">Becky</button>
      <button class="who-btn bailey" onclick="pickUser('bailey')">Bailey</button>
      <button class="who-btn syd"    onclick="pickUser('syd')">Syd</button>
      <button class="who-btn emma"   onclick="pickUser('emma')">Emma</button>
      <button class="who-btn abby"   onclick="pickUser('abby')">Abby</button>
    </div>
  </div>
</div>

<!-- SAVE MODAL -->
<div class="modal-overlay" id="saveModal" onclick="if(event.target===this)closeSaveModal()">
  <div class="modal-panel">
    <div class="modal-title">💾 Save Current List</div>
    <div class="modal-scroll-body">
      <input class="modal-input" id="saveNameInput" type="text" placeholder="List name (e.g. Weekly Staples)" onkeydown="if(event.key==='Enter')saveCurrentList()">
    </div>
    <div class="modal-actions" style="flex-shrink:0;">
      <button class="modal-btn modal-btn-cancel" onclick="closeSaveModal()">Cancel</button>
      <button class="modal-btn modal-btn-save"   onclick="saveCurrentList()">Save</button>
    </div>
  </div>
</div>

<!-- STORE PICKER MODAL -->
<div class="modal-overlay" id="storeModal" onclick="if(event.target===this)closeStoreModal()">
  <div class="modal-panel">
    <div class="modal-title">🏪 Assign to Store</div>
    <div class="modal-scroll-body">
      <div class="store-item-name" id="storeItemName"></div>
      <div class="store-grid" id="storeGrid"></div>
      <button class="store-clear" onclick="assignStore(null)">✕ No store / clear assignment</button>
      <div style="border-top:1px solid var(--border);margin:0.8rem 0 0.8rem;"></div>
      <div style="font-family:'Fraunces',serif;font-size:0.95rem;font-weight:700;color:var(--text);margin-bottom:0.6rem;">📂 Fix Category</div>
      <div class="cat-grid" id="catGrid"></div>
    </div>
    <div class="modal-actions" style="margin-top:0.8rem;flex-shrink:0;">
      <button class="modal-btn modal-btn-save" onclick="closeStoreModal()">Done</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

// ─── PARSE QTY ────────────────────────────────────────────────
function parseItem(text){
  text=text.trim();
  var m=text.match(/^(\d+\.?\d*)\s*(lbs?|oz|kg|g|dozen|doz|x|ct|count|pack|bunch|bag|box|can|bottle|jar|gallon|gal|qt|quart|pint|pt|liter|l|cups?|tbsp|tsp)?\s*(.+)/i);
  if(m)return{qty:parseFloat(m[1]),unit:(m[2]||'').toLowerCase(),name:m[3].trim()};
  var n=text.match(/^(\d+)\s+(.+)/);
  if(n)return{qty:parseInt(n[1]),unit:'',name:n[2].trim()};
  return{qty:1,unit:'',name:text};
}

// ─── AI CATEGORIZATION ────────────────────────────────────────
async function detectCategoryAI(itemName) {
  try {
    var systemPrompt = [
      'You are a grocery and household shopping categorizer. Respond with ONLY one category key word — no explanation, no punctuation.',
      '',
      'CATEGORIES:',
      'produce — fresh fruits, vegetables, herbs',
      'meat — raw meat, poultry, fish, seafood (NOT canned)',
      'dairy — milk, eggs, cheese, yogurt, butter, cream, oat milk, almond milk',
      'deli — lunch meat, rotisserie, hummus, olives, pickles, prepared foods',
      'bakery — bread, bagels, tortillas, buns, rolls, muffins, donuts, pies',
      'frozen — anything frozen',
      'breakfast — cereal, oatmeal, granola, pancake mix, syrup, pop tarts',
      'pasta — pasta, rice, noodles, grains, quinoa, couscous, ramen',
      'canned — canned/jarred goods, soup, broth, beans, tomato sauce, canned chicken, canned tuna',
      'condiments — sauces, oils, vinegar, spices, seasonings, baking, peanut butter, honey, ketchup, mustard, mayo, dressings',
      'snacks — chips, crackers, pretzels, popcorn, nuts, granola bars, protein bars, trail mix, jerky',
      'candy — candy, chocolate, gummies, cookies, brownies, desserts, sweets',
      'beverages — water, juice, soda, coffee, tea, sports drinks, energy drinks, kombucha, sparkling water',
      'alcohol — beer, wine, liquor, spirits, hard seltzer, cider, mixers',
      'household — ALL cleaning products and brands (Pledge, Windex, Lysol, Soft Scrub, 409, Clorox, Febreze, Tide, Dawn, Mr Clean, Pine Sol, Comet, Scrubbing Bubbles, Air Wick, Glade), paper towels, toilet paper, trash bags, laundry detergent, dish soap, sponges, candles, air fresheners, ziplock bags, sandwich bags, storage bags, foil, plastic wrap, light bulbs, batteries, paper plates, solo cups',
      'health — vitamins, medicine, supplements, shampoo, body wash, toothpaste, deodorant, bandaids, sunscreen, razors, feminine products',
      '',
      'CRITICAL RULES — always override general logic:',
      '- ANY cleaning product or brand = household',
      '- ANY plug-in or spray air freshener = household',
      '- ANY type of bag (ziplock, sandwich, storage, trash, gallon, quart) = household',
      '- Canned meat (canned chicken, canned tuna) = canned NOT meat',
      '- Soft Scrub, 409, Pledge, Windex, Lysol = household NOT health'
    ].join('\n');
    var resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 20,
        system: systemPrompt,
        messages: [{ role: 'user', content: itemName }]
      })
    });
    var data = await resp.json();
    var raw = (data.content && data.content[0] && data.content[0].text || '').trim().toLowerCase().replace(/[^a-z]/g,'');
    if (AISLES.find(function(a){ return a.key === raw; })) return raw;
    return detectCategory(itemName);
  } catch(e) {
    return detectCategory(itemName);
  }
}

// ─── ADD ──────────────────────────────────────────────────────
async function addItem(nameOverride){
  var input=document.getElementById('addInput');
  var text=nameOverride||input.value.trim();
  if(!text)return;
  var p=parseItem(text);

  // Look up any saved store from frequent history
  var fk=p.name.toLowerCase();
  var inheritedStore = (nameOverride && frequentItems[fk] && frequentItems[fk].store) || null;

  // Brief loading state
  var addBtn=document.querySelector('.add-btn');
  input.disabled=true; addBtn.disabled=true; addBtn.textContent='…';

  var category = await detectCategoryAI(p.name);

  input.disabled=false; addBtn.disabled=false; addBtn.textContent='+';

  items.push({id:Date.now()+'_'+Math.random().toString(36).substr(2,5),name:p.name,qty:p.qty,unit:p.unit,category:category,addedBy:currentUser,store:inheritedStore,checked:false,checkedBy:null,timestamp:Date.now()});
  if(!frequentItems[fk])frequentItems[fk]={name:p.name,count:0};
  frequentItems[fk].count++;frequentItems[fk].lastUsed=Date.now();
  saveState();renderList();
  if(!nameOverride){input.value='';document.getElementById('categoryHint').innerHTML='';}
  input.focus();
}

function toggleCheck(id,e){
  if(e){e.stopPropagation();e.preventDefault();}
  var item=items.find(function(i){return i.id===id;});
  if(item){
    item.checked=!item.checked;item.checkedBy=item.checked?currentUser:null;
    saveState();
    var card=document.querySelector('[data-id="'+id+'"]');
    if(card&&item.checked)card.classList.add('just-checked');
    setTimeout(function(){renderList();},item.checked?400:0);
  }
}
function deleteItem(id,e){
  if(e){e.stopPropagation();e.preventDefault();}
  items=items.filter(function(i){return i.id!==id;});
  saveState();renderList();
}

  items=items.filter(function(i){return!i.checked;});

}

  document.querySelectorAll('.cat-option').forEach(function(btn){btn.classList.remove('active');});

// ─── RENDER ───────────────────────────────────────────────────
function renderList(){
  var el=document.getElementById('listContent');
  var stats=document.getElementById('statsBar');
  var vis=currentStore==='all'?items:items.filter(function(i){return i.store===currentStore;});
  if(!vis.length){
    el.innerHTML=currentStore==='all'
      ?'<div class="empty-state"><div class="empty-icon">🛒</div><div class="empty-title">Your list is empty</div><div class="empty-sub">Type an item above or tap the mic to add by voice</div></div>'
      :'<div class="empty-state"><div class="empty-icon">🏪</div><div class="empty-title">No items for this store</div><div class="empty-sub">Tap any item row to assign it here</div></div>';
    stats.innerHTML='';return;
  }
  var chk=vis.filter(function(i){return i.checked;}).length;
  var unc=vis.length-chk;
  var storeLbl=currentStore!=='all'&&getStore(currentStore)?' in '+getStore(currentStore).label:'';
  stats.innerHTML='<div class="stats-text"><strong>'+unc+'</strong> item'+(unc!==1?'s':'')+' remaining'+storeLbl+(chk>0?' · <strong>'+chk+'</strong> done':'')+'</div>'+(chk>0?'<button class="clear-done-btn" onclick="clearChecked()">Clear done</button>':'');

  var unchk=vis.filter(function(i){return!i.checked;});
  var doneItems=vis.filter(function(i){return i.checked;});
  var grp={};
  unchk.forEach(function(i){if(!grp[i.category])grp[i.category]=[];grp[i.category].push(i);});
  var keys=Object.keys(grp).sort(function(a,b){return getAisle(a).order-getAisle(b).order;});
  var html='';
  keys.forEach(function(k){
    var ai=getAisle(k),its=grp[k];
    html+='<div class="aisle-group"><div class="aisle-header"><span class="aisle-icon">'+ai.icon+'</span><span class="aisle-name">'+ai.name+'</span><span class="aisle-count">'+its.length+'</span></div>';
    its.forEach(function(i){html+=card(i);});
    html+='</div>';
  });
  if(doneItems.length){
    html+='<div class="aisle-group"><div class="aisle-header"><span class="aisle-icon">✅</span><span class="aisle-name">Done</span><span class="aisle-count">'+doneItems.length+'</span></div>';
    doneItems.forEach(function(i){html+=card(i);});
    html+='</div>';
  }
  el.innerHTML=html;
}

function card(item){
  var qty=(item.qty>1||item.unit)?item.qty+(item.unit?' '+item.unit:''):'';
  var uk=USERS[item.addedBy]?item.addedBy:'mattc';
  var st=item.store?getStore(item.store):null;
  var badge=st?'<span class="store-badge '+st.key+'">'+st.abbr+'</span>':'';
  return '<div class="item-card'+(item.checked?' checked':'')+'" data-id="'+item.id+'">'+
    '<div class="item-check" onclick="toggleCheck(\''+item.id+'\',event)">'+(item.checked?'✓':'')+'</div>'+
    '<div class="item-body" onclick="openStorePicker(\''+item.id+'\',event)">'+
      '<div class="item-info"><div class="item-name">'+item.name+'</div>'+(qty?'<div class="item-qty">'+qty+'</div>':'')+' </div>'+
      badge+
    '</div>'+
    '<div class="item-user '+uk+'">'+USERS[uk].label+'</div>'+
    '<button class="item-delete" onclick="deleteItem(\''+item.id+'\',event)">✕</button>'+
  '</div>';
}

// ─── VOICE ────────────────────────────────────────────────────
var rec=null,isRec=false;
function toggleVoice(){
  if(!('webkitSpeechRecognition'in window)&&!('SpeechRecognition'in window)){showToast('Voice not supported');return;}
  if(isRec){rec.stop();return;}
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  rec=new SR();rec.continuous=false;rec.interimResults=false;rec.lang='en-US';
  rec.onstart=function(){isRec=true;document.getElementById('micBtn').classList.add('recording');};
  rec.onend=function(){isRec=false;document.getElementById('micBtn').classList.remove('recording');};
  rec.onerror=function(){isRec=false;document.getElementById('micBtn').classList.remove('recording');showToast('Could not hear you');};
  rec.onresult=function(e){var t=e.results[0][0].transcript;document.getElementById('addInput').value=t;onInputChange({target:{value:t},key:''});addItem();};
  rec.start();
}

function loadSavedList(id){
  var list=savedLists.find(function(l){return l.id===id;});if(!list)return;
  list.items.forEach(function(si){items.push({id:Date.now()+'_'+Math.random().toString(36).substr(2,5),name:si.name,qty:si.qty,unit:si.unit,category:si.category,store:si.store||null,addedBy:currentUser,checked:false,checkedBy:null,timestamp:Date.now()});});
  saveState();switchPanel('panelList');renderList();showToast('Loaded "'+list.name+'" — '+list.items.length+' items added');
}
function deleteSavedList(id,e){if(e)e.stopPropagation();savedLists=savedLists.filter(function(l){return l.id!==id;});saveState();renderSaved();showToast('List deleted');}
function renderSaved(){
  var el=document.getElementById('savedContent');
  if(!savedLists.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">📁</div><div class="empty-title">No saved lists yet</div><div class="empty-sub">Tap 💾 to save your current list as a template</div></div>';return;}
  var html='';
  savedLists.forEach(function(l){
    var d=new Date(l.created).toLocaleDateString('en-US',{month:'short',day:'numeric'});
    html+='<div class="saved-card" onclick="loadSavedList(\''+l.id+'\')"><div class="saved-icon">📋</div><div class="saved-info"><div class="saved-name">'+l.name+'</div><div class="saved-meta">'+l.items.length+' items · Saved '+d+'</div></div><button class="saved-del" onclick="deleteSavedList(\''+l.id+'\',event)">🗑️</button></div>';
  });
  el.innerHTML=html;
}

// ─── FREQUENT ─────────────────────────────────────────────────
var freqEditMode = false;
var freqCollapsed = {}; // tracks which category keys are collapsed

function toggleFreqEdit(){
  freqEditMode = !freqEditMode;
  var btn = document.getElementById('freqEditBtn');
  btn.textContent = freqEditMode ? 'Done' : 'Edit';
  btn.style.color = freqEditMode ? 'white' : 'var(--primary)';
  btn.style.background = freqEditMode ? 'var(--accent)' : 'var(--primary-light)';
  renderFrequent();
}

function toggleFreqCategory(catKey){
  freqCollapsed[catKey] = !freqCollapsed[catKey];
  var pills = document.getElementById('freq-pills-'+catKey);
  var chev  = document.getElementById('freq-chev-'+catKey);
  if(pills) pills.classList.toggle('hidden', !!freqCollapsed[catKey]);
  if(chev)  chev.classList.toggle('collapsed', !!freqCollapsed[catKey]);
}

function removeFrequent(key, e){
  e.stopPropagation(); e.preventDefault();
  delete frequentItems[key];
  saveFrequent();
  renderFrequent();
}

function renderFrequent(){
  var el=document.getElementById('freqContent');
  var all=Object.values(frequentItems).sort(function(a,b){return b.count-a.count;});
  if(!all.length){
    freqEditMode=false;
    var btn=document.getElementById('freqEditBtn');
    if(btn){btn.textContent='Edit';btn.style.color='var(--primary)';btn.style.background='var(--primary-light)';}
    el.innerHTML='<div class="empty-state" style="width:100%"><div class="empty-icon">⭐</div><div class="empty-title">No history yet</div><div class="empty-sub">Items you add will appear here for quick re-adding</div></div>';
    return;
  }

  // Group by category, using each item's stored category or detect it
  var groups = {};
  all.slice(0,60).forEach(function(f){
    var cat = f.category || detectCategory(f.name);
    if(!groups[cat]) groups[cat] = [];
    groups[cat].push(f);
  });

  // Sort groups by aisle order
  var sortedCats = Object.keys(groups).sort(function(a,b){
    return getAisle(a).order - getAisle(b).order;
  });

  var html = '';
  sortedCats.forEach(function(cat){
    var aisle = getAisle(cat);
    var items  = groups[cat];
    var isCollapsed = !!freqCollapsed[cat];
    html += '<div class="freq-group">';
    html += '<div class="freq-cat-header" onclick="toggleFreqCategory(\''+cat+'\')">' +
      '<div class="freq-cat-left">' +
        '<span class="freq-cat-icon">'+aisle.icon+'</span>' +
        '<span class="freq-cat-name">'+aisle.name+'</span>' +
        '<span class="freq-cat-count">'+items.length+'</span>' +
      '</div>' +
      '<span class="freq-cat-chevron'+(isCollapsed?' collapsed':'')+'" id="freq-chev-'+cat+'">▼</span>' +
    '</div>';
    html += '<div class="freq-cat-pills'+(isCollapsed?' hidden':'')+'" id="freq-pills-'+cat+'">';
    items.forEach(function(f){
      var key = f.name.toLowerCase();
      var safeName = f.name.replace(/'/g,"\\'");
      if(freqEditMode){
        html += '<button class="freq-chip edit-mode">'+f.name+
          '<span class="freq-remove" onclick="removeFrequent(\''+key.replace(/'/g,"\\'")+'\',event)">✕</span>'+
        '</button>';
      } else {
        html += '<button class="freq-chip" onclick="addItem(\''+safeName+'\');showToast(\'✓ '+safeName+' added!\')">'+f.name+'</button>';
      }
    });
    html += '</div></div>';
  });

  el.innerHTML = html;
}

// ─── WHO ARE YOU ──────────────────────────────────────────────
var LS_USER = 'onelist_user';

function openWhoModal(){
  document.getElementById('whoModal').classList.add('open');
}
function pickUser(u){
  localStorage.setItem(LS_USER, u);
  setUser(u);
  document.getElementById('whoModal').classList.remove('open');
  showToast('Welcome, ' + (u==='mattc'?'Matt C':u==='matth'?'Matt H':u.charAt(0).toUpperCase()+u.slice(1)) + '!');
}

// ─── NAV ──────────────────────────────────────────────────────
function switchPanel(id){
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active');});
  document.querySelector('.nav-btn[data-panel="'+id+'"]').classList.add('active');
  if(id==='panelSaved')renderSaved();
  if(id==='panelFrequent')renderFrequent();
  if(id!=='panelFrequent' && freqEditMode){
    freqEditMode=false;
    freqCollapsed={};
    var btn=document.getElementById('freqEditBtn');
    if(btn){btn.textContent='Edit';btn.style.color='var(--primary)';btn.style.background='var(--primary-light)';}
  }
}

// ─── TOAST ────────────────────────────────────────────────────
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}

// ─── INIT ─────────────────────────────────────────────────────
fixOffsets();
setTimeout(function(){ if(!items.length) renderList(); }, 800);

// Check for saved user — delay slightly so iOS has fully painted the DOM
setTimeout(function(){
  var savedUser = localStorage.getItem(LS_USER);
  if(savedUser && USERS[savedUser]){
    setUser(savedUser);
  } else {
    document.getElementById('whoModal').classList.add('open');
  }
}, 300);
</script>

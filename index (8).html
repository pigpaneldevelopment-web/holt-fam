<script src="https://cdn.jsdelivr.net/npm/firebase@8.10.1/firebase-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@8.10.1/firebase-database.js"></script>
<style>
  :root {
    --bg: #FFF8F0;
    --card: #FFFFFF;
    --primary: #2D5A3D;
    --primary-light: #E8F5E9;
    --primary-dark: #1B3D28;
    --accent: #E8735A;
    --accent-light: #FFF0EC;
    --text: #1A2E23;
    --text-mid: #5A7A66;
    --text-light: #8FA89A;
    --border: rgba(45,90,61,0.1);
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
    --mattc:  #4A90D9;
    --matth:  #27AE60;
    --becky:  #D94A8A;
    --bailey: #E8A020;
    --syd:    #9B59B6;
    --emma:   #1ABC9C;
    --abby:   #E74C3C;
    --header-h: 168px;
    --tabs-h:   41px;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    font-family:'DM Sans',sans-serif;
    background:var(--bg); color:var(--text);
    min-height:100vh; min-height:100dvh;
    padding-bottom:70px; overflow-x:hidden;
  }

  /* HEADER */
  .app-header {
    background:linear-gradient(135deg,var(--primary) 0%,var(--primary-dark) 100%);
    padding:0.5rem 1rem;
    position:sticky; top:0; z-index:100;
    box-shadow:0 4px 20px rgba(0,0,0,0.12);
  }
  .header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:0.35rem; }
  .app-title { font-family:'Fraunces',serif; font-size:1.4rem; font-weight:800; color:white; letter-spacing:-0.5px; }
  .app-title span { color:var(--accent); }
  .header-btn {
    background:rgba(255,255,255,0.12); border:none; border-radius:10px;
    color:white; font-size:1.1rem; width:38px; height:38px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:background 0.2s;
  }
  .header-btn:hover { background:rgba(255,255,255,0.2); }

  /* USER PICKER */
  .user-picker { display:flex; gap:0.3rem; margin-bottom:0.4rem; }
  .user-chip {
    flex:1; padding:0.3rem 0.2rem;
    border:2px solid rgba(255,255,255,0.15); border-radius:10px;
    background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.6);
    font-family:'DM Sans',sans-serif; font-size:0.72rem; font-weight:600;
    cursor:pointer; transition:all 0.2s; text-align:center; white-space:nowrap;
  }
  .user-chip.active-mattc  { border-color:var(--mattc);  background:rgba(74,144,217,0.25);  color:white; }
  .user-chip.active-matth  { border-color:var(--matth);  background:rgba(39,174,96,0.25);   color:white; }
  .user-chip.active-becky  { border-color:var(--becky);  background:rgba(217,74,138,0.25);  color:white; }
  .user-chip.active-bailey { border-color:var(--bailey); background:rgba(232,160,32,0.25);  color:white; }
  .user-chip.active-syd    { border-color:var(--syd);    background:rgba(155,89,182,0.25);  color:white; }
  .user-chip.active-emma   { border-color:var(--emma);   background:rgba(26,188,156,0.25);  color:white; }
  .user-chip.active-abby   { border-color:var(--abby);   background:rgba(231,76,60,0.25);   color:white; }

  /* ADD BAR */
  .add-bar { display:flex; gap:0.4rem; align-items:center; }
  .add-input {
    flex:1; padding:0.7rem 1rem;
    border:2px solid rgba(255,255,255,0.15); border-radius:12px;
    background:rgba(255,255,255,0.1); color:white;
    font-family:'DM Sans',sans-serif; font-size:0.95rem; font-weight:500;
    outline:none; transition:border-color 0.2s;
  }
  .add-input::placeholder { color:rgba(255,255,255,0.35); }
  .add-input:focus { border-color:rgba(255,255,255,0.4); }
  .add-btn {
    width:44px; height:44px; border:none; border-radius:12px;
    background:var(--accent); color:white; font-size:1.3rem;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:transform 0.15s; flex-shrink:0;
  }
  .add-btn:active { transform:scale(0.92); }
  .mic-btn {
    width:44px; height:44px; border:none; border-radius:12px;
    background:rgba(255,255,255,0.12); color:white; font-size:1.1rem;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:background 0.2s; flex-shrink:0;
  }
  .mic-btn.recording { background:#E74C3C; animation:micPulse 1s ease infinite; }
  @keyframes micPulse { 0%,100%{opacity:1;} 50%{opacity:0.6;} }
  .category-hint {
    font-size:0.72rem; color:rgba(255,255,255,0.4);
    margin-top:0.4rem; min-height:1rem; padding-left:0.2rem;
  }
  .category-hint em { color:var(--accent); font-style:normal; font-weight:600; }

  /* STORE FILTER TABS */
  .store-tabs-wrap {
    position:sticky; top:var(--header-h);
    z-index:90; background:var(--bg);
    border-bottom:1px solid var(--border);
    box-shadow:0 2px 6px rgba(0,0,0,0.04);
  }
  .store-tabs {
    display:flex; overflow-x:auto;
    -webkit-overflow-scrolling:touch; scrollbar-width:none;
    padding:0 0.75rem;
  }
  .store-tabs::-webkit-scrollbar { display:none; }
  .store-tab {
    flex-shrink:0; padding:0.55rem 0.9rem;
    border:none; background:none;
    font-family:'DM Sans',sans-serif; font-size:0.78rem; font-weight:600;
    color:var(--text-light); cursor:pointer;
    border-bottom:2.5px solid transparent;
    transition:all 0.18s; white-space:nowrap;
    margin-bottom:-1px;
  }
  .store-tab:hover { color:var(--primary); }
  .store-tab.active { color:var(--primary); border-bottom-color:var(--primary); }

  /* STATS */
  .stats-bar { display:flex; justify-content:space-between; align-items:center; padding:0.7rem 1.2rem; }
  .stats-text { font-size:0.78rem; font-weight:600; color:var(--text-light); }
  .stats-text strong { color:var(--primary); }
  .clear-done-btn {
    font-family:'DM Sans',sans-serif; font-size:0.75rem; font-weight:600;
    color:var(--accent); background:none; border:none; cursor:pointer;
    padding:0.3rem 0.6rem; border-radius:6px; transition:background 0.2s;
  }
  .clear-done-btn:hover { background:var(--accent-light); }

  /* AISLE GROUPS */
  .aisle-group { margin:0 1rem 0.8rem; }
  .aisle-header {
    display:flex; align-items:center; gap:0.5rem;
    padding:0.5rem 0.3rem;
    position:sticky; top:calc(var(--header-h) + var(--tabs-h));
    z-index:10; background:var(--bg);
  }
  .aisle-icon { font-size:1.1rem; }
  .aisle-name { font-family:'Fraunces',serif; font-size:0.88rem; font-weight:700; color:var(--primary); letter-spacing:-0.3px; }
  .aisle-count { font-size:0.65rem; font-weight:700; color:var(--text-light); background:var(--primary-light); padding:0.1rem 0.45rem; border-radius:8px; }

  /* ITEM CARD */
  .item-card {
    background:var(--card); border-radius:12px;
    padding:0.7rem 0.8rem; margin-bottom:0.4rem;
    display:flex; align-items:center; gap:0.7rem;
    box-shadow:var(--shadow); transition:transform 0.2s, opacity 0.3s;
    position:relative; overflow:hidden;
  }
  .item-card.checked { opacity:0.5; background:#F5F5F0; box-shadow:none; }
  .item-card.checked .item-name { text-decoration:line-through; color:var(--text-light); }
  .item-card.just-checked { animation:checkSlide 0.4s ease; }
  @keyframes checkSlide { 0%{transform:scale(1);} 30%{transform:scale(0.97);} 100%{transform:scale(1);} }

  .item-check {
    width:26px; height:26px; border-radius:8px;
    border:2.5px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0; font-size:0.75rem; color:transparent;
    background:white; transition:all 0.2s; cursor:pointer; z-index:2;
  }
  .item-card.checked .item-check { background:var(--primary); border-color:var(--primary); color:white; }

  .item-body {
    flex:1; min-width:0; display:flex; align-items:center; gap:0.5rem; cursor:pointer;
  }
  .item-info { flex:1; min-width:0; }
  .item-name { font-size:0.9rem; font-weight:600; color:var(--text); line-height:1.3; }
  .item-qty  { font-size:0.72rem; color:var(--text-mid); margin-top:0.1rem; }

  /* Store badge */
  .store-badge {
    flex-shrink:0; font-size:0.58rem; font-weight:800;
    padding:0.18rem 0.4rem; border-radius:5px; color:white; letter-spacing:0.4px;
  }
  .store-badge.schnucks   { background:#C0392B; }
  .store-badge.costco     { background:#0047AB; }
  .store-badge.traderjoes { background:#D35400; }
  .store-badge.dierbergs  { background:#27AE60; }
  .store-badge.wholefoods { background:#00674B; }

  .item-user {
    width:22px; height:22px; border-radius:50%;
    font-size:0.55rem; font-weight:800; color:white;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .item-user.mattc  { background:var(--mattc); }
  .item-user.matth  { background:var(--matth); }
  .item-user.becky  { background:var(--becky); }
  .item-user.bailey { background:var(--bailey); }
  .item-user.syd    { background:var(--syd); }
  .item-user.emma   { background:var(--emma); }
  .item-user.abby   { background:var(--abby); }

  .item-delete {
    background:none; border:none; color:var(--text-light); font-size:1rem;
    cursor:pointer; padding:0.3rem; opacity:0; transition:opacity 0.2s; flex-shrink:0;
  }
  .item-card:hover .item-delete, .item-card:active .item-delete { opacity:1; }
  @media (hover:none) { .item-delete { opacity:0.4; } }

  /* EMPTY STATE */
  .empty-state { text-align:center; padding:3rem 2rem; }
  .empty-icon  { font-size:3rem; margin-bottom:0.5rem; }
  .empty-title { font-family:'Fraunces',serif; font-size:1.2rem; font-weight:700; color:var(--text); margin-bottom:0.3rem; }
  .empty-sub   { font-size:0.85rem; color:var(--text-light); }

  /* BOTTOM NAV */
  .bottom-nav {
    position:fixed; bottom:0; left:0; right:0;
    background:white; border-top:1px solid var(--border);
    display:flex; padding:0.3rem 0.5rem;
    padding-bottom:calc(env(safe-area-inset-bottom,0px) + 0.2rem);
    z-index:100; box-shadow:0 -2px 12px rgba(0,0,0,0.05);
  }
  .nav-btn {
    flex:1; display:flex; flex-direction:column; align-items:center; gap:0.2rem;
    padding:0.25rem 0; border:none; background:none; cursor:pointer;
    color:var(--text-light); transition:color 0.2s; font-family:'DM Sans',sans-serif;
  }
  .nav-btn.active { color:var(--primary); }
  .nav-icon  { font-size:1.3rem; }
  .nav-label { font-size:0.65rem; font-weight:600; letter-spacing:0.3px; }

  /* PANELS */
  .panel { display:none; }
  .panel.active { display:block; }

  /* SAVED LISTS */
  .saved-card {
    background:var(--card); border-radius:14px; padding:1rem;
    margin:0 1rem 0.6rem; box-shadow:var(--shadow);
    display:flex; align-items:center; gap:0.8rem;
    cursor:pointer; transition:transform 0.15s;
  }
  .saved-card:active { transform:scale(0.98); }
  .saved-icon { width:44px; height:44px; border-radius:12px; background:var(--primary-light); display:flex; align-items:center; justify-content:center; font-size:1.3rem; flex-shrink:0; }
  .saved-info { flex:1; min-width:0; }
  .saved-name { font-family:'Fraunces',serif; font-size:0.95rem; font-weight:700; color:var(--text); }
  .saved-meta { font-size:0.72rem; color:var(--text-light); margin-top:0.1rem; }
  .saved-del  { width:34px; height:34px; border:none; border-radius:8px; background:var(--accent-light); color:var(--accent); font-size:0.9rem; display:flex; align-items:center; justify-content:center; cursor:pointer; }

  /* FREQUENT */
  .freq-grid { display:flex; flex-wrap:wrap; gap:0.4rem; padding:0 1rem; }
  .freq-chip {

// ─── PARSE QTY ────────────────────────────────────────────────
function parseItem(text){
  text=text.trim();
  var m=text.match(/^(\d+\.?\d*)\s*(lbs?|oz|kg|g|dozen|doz|x|ct|count|pack|bunch|bag|box|can|bottle|jar|gallon|gal|qt|quart|pint|pt|liter|l|cups?|tbsp|tsp)?\s*(.+)/i);
  if(m)return{qty:parseFloat(m[1]),unit:(m[2]||'').toLowerCase(),name:m[3].trim()};
  var n=text.match(/^(\d+)\s+(.+)/);
  if(n)return{qty:parseInt(n[1]),unit:'',name:n[2].trim()};
  return{qty:1,unit:'',name:text};
}

// ─── AI CATEGORIZATION ────────────────────────────────────────
async function detectCategoryAI(itemName) {
  try {
    var resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 20,
        system: 'You are a grocery store categorizer. Given an item name, respond with ONLY the single best category key from this list: produce, meat, dairy, deli, bakery, frozen, breakfast, pasta, canned, condiments, snacks, candy, beverages, alcohol, household, health. Use "candy" for candy/chocolate/sweets/cookies. Use "snacks" for chips/crackers/nuts/bars. Use "beverages" for non-alcoholic drinks. Use "breakfast" for cereal/oatmeal/pancake items. Use "pasta" for pasta/rice/grains. Use "canned" for canned/jarred goods. Use "condiments" for sauces/spices/oils/baking. No explanation, no punctuation — just the key word.',
        messages: [{ role: 'user', content: itemName }]
      })
    });
    var data = await resp.json();
    var raw = (data.content && data.content[0] && data.content[0].text || '').trim().toLowerCase().replace(/[^a-z]/g,'');
    if (AISLES.find(function(a){ return a.key === raw; })) return raw;
    return detectCategory(itemName);
  } catch(e) {
    return detectCategory(itemName);
  }
}

// ─── ADD ──────────────────────────────────────────────────────
async function addItem(nameOverride){
  var input=document.getElementById('addInput');
  var text=nameOverride||input.value.trim();
  if(!text)return;
  var p=parseItem(text);

  // Brief loading state
  var addBtn=document.querySelector('.add-btn');
  input.disabled=true; addBtn.disabled=true; addBtn.textContent='…';

  var category = await detectCategoryAI(p.name);

  input.disabled=false; addBtn.disabled=false; addBtn.textContent='+';

  items.push({id:Date.now()+'_'+Math.random().toString(36).substr(2,5),name:p.name,qty:p.qty,unit:p.unit,category:category,addedBy:currentUser,store:null,checked:false,checkedBy:null,timestamp:Date.now()});
  var fk=p.name.toLowerCase();
  if(!frequentItems[fk])frequentItems[fk]={name:p.name,count:0};
  frequentItems[fk].count++;frequentItems[fk].lastUsed=Date.now();
  saveState();renderList();
  if(!nameOverride){input.value='';document.getElementById('categoryHint').innerHTML='';}
  input.focus();
}

// ─── CHECK / DELETE ───────────────────────────────────────────
function toggleCheck(id,e){
  if(e){e.stopPropagation();e.preventDefault();}
  var item=items.find(function(i){return i.id===id;});
  if(item){
    item.checked=!item.checked;item.checkedBy=item.checked?currentUser:null;
    saveState();
    var card=document.querySelector('[data-id="'+id+'"]');
    if(card&&item.checked)card.classList.add('just-checked');
    setTimeout(function(){renderList();},item.checked?400:0);
  }
}
function deleteItem(id,e){
  if(e){e.stopPropagation();e.preventDefault();}
  items=items.filter(function(i){return i.id!==id;});
  saveState();renderList();
}
function clearChecked(){
  items=items.filter(function(i){return!i.checked;});
  saveState();renderList();showToast('Cleared checked items');
}

// ─── STORE PICKER ─────────────────────────────────────────────
function openStorePicker(id,e){
  if(e){e.stopPropagation();e.preventDefault();}
  var item=items.find(function(i){return i.id===id;});
  if(!item)return;
  pickerId=id;
  document.getElementById('storeItemName').textContent=item.name;
  var html='';
  STORES.forEach(function(s){
    var sel=item.store===s.key?' sel-'+s.key:'';
    html+='<button class="store-option'+sel+'" onclick="assignStore(\''+s.key+'\')">'+
      '<span>'+s.emoji+'</span><span>'+s.label+'</span>'+
      '<span class="store-abbr">'+s.abbr+'</span>'+
    '</button>';
  });
  document.getElementById('storeGrid').innerHTML=html;
  document.getElementById('storeModal').classList.add('open');
}
function closeStoreModal(){document.getElementById('storeModal').classList.remove('open');pickerId=null;}
function assignStore(sk){
  var item=items.find(function(i){return i.id===pickerId;});
  if(!item)return;
  item.store=sk;saveState();
  // refresh selection in-place
  document.querySelectorAll('.store-option').forEach(function(btn,idx){
    var s=STORES[idx];
    btn.className='store-option'+(sk===s.key?' sel-'+s.key:'');
  });
  renderList();
  showToast(sk?item.name+' → '+getStore(sk).label:'Store cleared');
}

// ─── RENDER ───────────────────────────────────────────────────
function renderList(){
  var el=document.getElementById('listContent');
  var stats=document.getElementById('statsBar');
  var vis=currentStore==='all'?items:items.filter(function(i){return i.store===currentStore;});
  if(!vis.length){
    el.innerHTML=currentStore==='all'
      ?'<div class="empty-state"><div class="empty-icon">🛒</div><div class="empty-title">Your list is empty</div><div class="empty-sub">Type an item above or tap the mic to add by voice</div></div>'
      :'<div class="empty-state"><div class="empty-icon">🏪</div><div class="empty-title">No items for this store</div><div class="empty-sub">Tap any item row to assign it here</div></div>';
    stats.innerHTML='';return;
  }
  var chk=vis.filter(function(i){return i.checked;}).length;
  var unc=vis.length-chk;
  var storeLbl=currentStore!=='all'&&getStore(currentStore)?' in '+getStore(currentStore).label:'';
  stats.innerHTML='<div class="stats-text"><strong>'+unc+'</strong> item'+(unc!==1?'s':'')+' remaining'+storeLbl+(chk>0?' · <strong>'+chk+'</strong> done':'')+'</div>'+(chk>0?'<button class="clear-done-btn" onclick="clearChecked()">Clear done</button>':'');

  var unchk=vis.filter(function(i){return!i.checked;});
  var doneItems=vis.filter(function(i){return i.checked;});
  var grp={};
  unchk.forEach(function(i){if(!grp[i.category])grp[i.category]=[];grp[i.category].push(i);});
  var keys=Object.keys(grp).sort(function(a,b){return getAisle(a).order-getAisle(b).order;});
  var html='';
  keys.forEach(function(k){
    var ai=getAisle(k),its=grp[k];
    html+='<div class="aisle-group"><div class="aisle-header"><span class="aisle-icon">'+ai.icon+'</span><span class="aisle-name">'+ai.name+'</span><span class="aisle-count">'+its.length+'</span></div>';
    its.forEach(function(i){html+=card(i);});
    html+='</div>';
  });
  if(doneItems.length){
    html+='<div class="aisle-group"><div class="aisle-header"><span class="aisle-icon">✅</span><span class="aisle-name">Done</span><span class="aisle-count">'+doneItems.length+'</span></div>';
    doneItems.forEach(function(i){html+=card(i);});
    html+='</div>';
  }
  el.innerHTML=html;
}

function card(item){
  var qty=(item.qty>1||item.unit)?item.qty+(item.unit?' '+item.unit:''):'';
  var uk=USERS[item.addedBy]?item.addedBy:'mattc';
  var st=item.store?getStore(item.store):null;
  var badge=st?'<span class="store-badge '+st.key+'">'+st.abbr+'</span>':'';
  return '<div class="item-card'+(item.checked?' checked':'')+'" data-id="'+item.id+'">'+
    '<div class="item-check" onclick="toggleCheck(\''+item.id+'\',event)">'+(item.checked?'✓':'')+'</div>'+
    '<div class="item-body" onclick="openStorePicker(\''+item.id+'\',event)">'+
      '<div class="item-info"><div class="item-name">'+item.name+'</div>'+(qty?'<div class="item-qty">'+qty+'</div>':'')+' </div>'+
      badge+
    '</div>'+
    '<div class="item-user '+uk+'">'+USERS[uk].label+'</div>'+
    '<button class="item-delete" onclick="deleteItem(\''+item.id+'\',event)">✕</button>'+
  '</div>';
}

// ─── TITLE CASE INPUT ─────────────────────────────────────────
function titleCaseInput(el){
  var pos=el.selectionStart;
  el.value=el.value.replace(/\b\w/g,function(c){return c.toUpperCase();});
  el.setSelectionRange(pos,pos);
}

// ─── INPUT HINT ───────────────────────────────────────────────
function onInputChange(e){
  var text=e.target.value.trim(),hint=document.getElementById('categoryHint');
  if(text.length<2||e.key==='Enter'){hint.innerHTML='';return;}
  var ai=getAisle(detectCategory(parseItem(text).name));
  hint.innerHTML='→ <em>'+ai.icon+' '+ai.name+'</em>';
}

// ─── VOICE ────────────────────────────────────────────────────
var rec=null,isRec=false;
function toggleVoice(){
  if(!('webkitSpeechRecognition'in window)&&!('SpeechRecognition'in window)){showToast('Voice not supported');return;}
  if(isRec){rec.stop();return;}
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  rec=new SR();rec.continuous=false;rec.interimResults=false;rec.lang='en-US';
  rec.onstart=function(){isRec=true;document.getElementById('micBtn').classList.add('recording');};
  rec.onend=function(){isRec=false;document.getElementById('micBtn').classList.remove('recording');};
  rec.onerror=function(){isRec=false;document.getElementById('micBtn').classList.remove('recording');showToast('Could not hear you');};
  rec.onresult=function(e){var t=e.results[0][0].transcript;document.getElementById('addInput').value=t;onInputChange({target:{value:t},key:''});addItem();};
  rec.start();
}

// ─── SAVED LISTS ──────────────────────────────────────────────
function openSaveModal(){document.getElementById('saveModal').classList.add('open');var i=document.getElementById('saveNameInput');i.value='';setTimeout(function(){i.focus();},300);}
function closeSaveModal(){document.getElementById('saveModal').classList.remove('open');}
function saveCurrentList(){
  var name=document.getElementById('saveNameInput').value.trim();
  if(!name){showToast('Enter a name');return;}
  var unc=items.filter(function(i){return!i.checked;});
  if(!unc.length){showToast('No items to save');return;}
  savedLists.push({id:Date.now().toString(),name:name,items:unc.map(function(i){return{name:i.name,qty:i.qty,unit:i.unit,category:i.category,store:i.store||null};}),created:Date.now()});
  saveState();closeSaveModal();showToast('Saved "'+name+'"');renderSaved();
}
function loadSavedList(id){
  var list=savedLists.find(function(l){return l.id===id;});if(!list)return;
  list.items.forEach(function(si){items.push({id:Date.now()+'_'+Math.random().toString(36).substr(2,5),name:si.name,qty:si.qty,unit:si.unit,category:si.category,store:si.store||null,addedBy:currentUser,checked:false,checkedBy:null,timestamp:Date.now()});});
  saveState();switchPanel('panelList');renderList();showToast('Loaded "'+list.name+'" — '+list.items.length+' items added');
}
function deleteSavedList(id,e){if(e)e.stopPropagation();savedLists=savedLists.filter(function(l){return l.id!==id;});saveState();renderSaved();showToast('List deleted');}
function renderSaved(){
  var el=document.getElementById('savedContent');
  if(!savedLists.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">📁</div><div class="empty-title">No saved lists yet</div><div class="empty-sub">Tap 💾 to save your current list as a template</div></div>';return;}
  var html='';
  savedLists.forEach(function(l){
    var d=new Date(l.created).toLocaleDateString('en-US',{month:'short',day:'numeric'});
    html+='<div class="saved-card" onclick="loadSavedList(\''+l.id+'\')"><div class="saved-icon">📋</div><div class="saved-info"><div class="saved-name">'+l.name+'</div><div class="saved-meta">'+l.items.length+' items · Saved '+d+'</div></div><button class="saved-del" onclick="deleteSavedList(\''+l.id+'\',event)">🗑️</button></div>';
  });
  el.innerHTML=html;
}

// ─── FREQUENT ─────────────────────────────────────────────────
function renderFrequent(){
  var el=document.getElementById('freqContent');
  var s=Object.values(frequentItems).sort(function(a,b){return b.count-a.count;});
  if(!s.length){el.innerHTML='<div class="empty-state" style="width:100%"><div class="empty-icon">⭐</div><div class="empty-title">No history yet</div><div class="empty-sub">Items you add will appear here for quick re-adding</div></div>';return;}
  var html='';s.slice(0,30).forEach(function(f){html+='<button class="freq-chip" onclick="addItem(\''+f.name.replace(/'/g,"\\'")+'\')">'+f.name+'</button>';});
  el.innerHTML=html;
}

// ─── NAV ──────────────────────────────────────────────────────
function switchPanel(id){
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active');});
  document.querySelector('.nav-btn[data-panel="'+id+'"]').classList.add('active');
  if(id==='panelSaved')renderSaved();
  if(id==='panelFrequent')renderFrequent();
}

// ─── TOAST ────────────────────────────────────────────────────
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}

// ─── INIT ─────────────────────────────────────────────────────
fixOffsets();
setTimeout(function(){ if(!items.length) renderList(); }, 800);
</script>
